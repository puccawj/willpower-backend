services:
  api:
    build: .
    container_name: nestjs_api
    restart: unless-stopped
    # 💡 เพิ่ม 2 บรรทัดนี้เข้าไปเพื่อให้คนภายนอกเข้าผ่านพอร์ต 3000 ได้
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: ${PORT}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
    volumes:
      - ./uploads:/app/uploads
    networks:
      - app_network

networks:
  app_network:
    external: true
